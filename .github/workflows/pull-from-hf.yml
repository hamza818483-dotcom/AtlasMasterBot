name: Sync FROM HuggingFace (one-time pull)
on: workflow_dispatch

jobs:
  pull-from-hf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Pull latest from HF Space and push to GitHub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "bot@atlasapp.dev"
          git config user.name "Atlas Bot"
          git clone https://HamzaHF1:${HF_TOKEN}@huggingface.co/spaces/HamzaHF1/ATLAS-Bot hf-latest
          rm -rf hf-latest/.git
          rsync -av --exclude='.git' hf-latest/ ./
          rm -rf hf-latest
          git add -A
          git commit -m "sync: pull latest code from HF Space (HamzaHF1/ATLAS-Bot)" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
